je_nav_destinations:
  description: "The primary navigation destinations shown in the desktop strip. Each row is one destination. Use type 'link' for a direct destination, or 'dropdown' to open a panel of child links (e.g. Discussions). The /my/ alias resolves to the current user automatically."
  type: objects
  default:
    [
      { "label": "Home", "icon": "house", "href": "/", "type": "link" },
      {
        "label": "Discussions",
        "icon": "comments",
        "type": "dropdown",
        "children":
          [
            { "label": "General", "icon": "book-open", "href": "/c/general/4", "subtext": "Most active" },
            { "label": "Site Feedback", "icon": "message", "href": "/c/site-feedback/2", "subtext": "Suggestions & bugs" },
            { "label": "All categories", "icon": "table-cells-large", "href": "/categories", "subtext": "Enter the full forum" },
          ],
      },
      { "label": "Matches", "icon": "heart", "href": "/matchmaking/matches", "type": "link" },
      { "label": "Messages", "icon": "envelope", "href": "/my/messages", "type": "link" },
      { "label": "Talk to Logos", "icon": "wand-magic-sparkles", "href": "/discourse-ai/ai-bot/conversations", "type": "link" },
    ]
  schema:
    name: "destination"
    identifier: label
    properties:
      label:
        type: string
        required: true
      icon:
        type: string
        required: true
      type:
        type: enum
        default: link
        choices:
          - link
          - dropdown
      href:
        type: string
        validations:
          url: true
      children:
        type: objects
        schema:
          name: "child"
          identifier: label
          properties:
            label:
              type: string
              required: true
            icon:
              type: string
            href:
              type: string
              required: true
              validations:
                url: true
            subtext:
              type: string

je_nav_show_brand:
  description: "Show the brand lockup (icon + name) at the left of the strip. Disable if your theme already renders a logo above the strip."
  type: bool
  default: true

je_nav_brand_label:
  description: "Text shown in the brand lockup."
  type: string
  default: "Jesus Enough"

je_nav_brand_icon:
  description: "FontAwesome icon name for the brand lockup."
  type: string
  default: "cross"

je_nav_show_avatar:
  description: "Show a link to the user's account at the right of the strip. Leave OFF if you rely on Discourse's native header avatar menu (recommended, to avoid duplicating the account menu)."
  type: bool
  default: false

je_nav_hide_sidebar_in_plaza:
  description: "Hide the Discourse sidebar everywhere except forum routes (Plaza mode). When OFF, the strip still renders but the sidebar is left visible everywhere."
  type: bool
  default: true

je_nav_forum_route_classes:
  description: "Body classes that mark a 'forum mode' route, where the sidebar should remain visible. Add more (e.g. tag-show pages) as your forum grows."
  type: list
  list_type: compact
  default: "navigation-categories|navigation-topics|navigation-category|categories-list"

svg_icons:
  default: "cross"
  type: list
  list_type: "compact"
  description: "Extra FontAwesome icons referenced by settings (brand icon, custom destinations). Add any icon you reference in je_nav_destinations here."
