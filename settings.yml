# ── Header Mega Nav — per-site settings ─────────────────────────────────
#
# ONE REPO, MANY SITES. Everything an admin edits here is stored in THIS
# site's database (theme_settings), so the same component installed on two
# sites carries two fully independent menus. Component updates ship new
# DEFAULTS and SCHEMA only — a site that has edited a setting keeps its
# value through every update. The defaults below are EXAMPLES (revision-1
# links) to make the schema visible; replace them per site in
# Admin → Customize → Themes → this component → Settings. No rebuild, no
# file edits — changes apply on the next page refresh.
#
# SCHEMA DISCIPLINE (for future maintainers): evolve this schema
# ADDITIVELY only. Never rename a setting key or remove a property —
# stored per-site values are keyed to them.

je_nav_destinations:
  description: >-
    The primary navigation. Each row is one destination: type 'link' goes
    straight to href; type 'dropdown' opens a panel of children. MEGA MENU:
    give children a 'section' label and the panel renders one titled column
    per section (children without a section render first, untitled).
    Visibility: show_when = all / members (logged-in) / staff, per
    destination AND per child. 'badge' renders a small accent chip (NEW,
    LIVE). The /my/ href alias resolves to the current user. 'color' tints
    the icon when not active (any CSS color). Icons must be in the
    svg_icons setting below (or already in core's subset).
  type: objects
  default:
    [
      {
        "label": "Discussions",
        "icon": "comments",
        "type": "dropdown",
        "color": "#378add",
        "children":
          [
            { "label": "General", "icon": "book-open", "href": "/c/general/4", "subtext": "Most active" },
            { "label": "Site Feedback", "icon": "message", "href": "/c/site-feedback/2", "subtext": "Suggestions & bugs" },
            { "label": "All categories", "icon": "table-cells-large", "href": "/categories", "subtext": "Enter the full forum" },
          ],
      },
      { "label": "Matches", "icon": "heart", "href": "/matchmaking/matches", "type": "link", "color": "#e24b4a" },
      { "label": "Messages", "icon": "envelope", "href": "/my/messages", "type": "link", "color": "#1d9e75" },
      { "label": "Talk to Logos", "icon": "wand-magic-sparkles", "href": "/discourse-ai/ai-bot/conversations", "type": "link", "color": "#b07cdb" },
    ]
  schema:
    name: "destination"
    identifier: label
    properties:
      label:
        type: string
        required: true
      icon:
        type: string
        required: true
      type:
        type: enum
        default: link
        choices:
          - link
          - dropdown
      href:
        type: string
        validations:
          url: true
      color:
        type: string
      badge:
        type: string
      order:
        type: integer
      show_when:
        type: enum
        default: all
        choices:
          - all
          - members
          - staff
      mobile_pinned:
        type: boolean
        default: false
      children:
        type: objects
        schema:
          name: "child"
          identifier: label
          properties:
            label:
              type: string
              required: true
            icon:
              type: string
            href:
              type: string
              required: true
              validations:
                url: true
            subtext:
              type: string
            section:
              type: string
            badge:
              type: string
            order:
              type: integer
            show_when:
              type: enum
              default: all
              choices:
                - all
                - members
                - staff

je_nav_show_anon:
  description: "Show the navigation strip to anonymous (logged-out) visitors. Items marked show_when 'members' or 'staff' stay hidden for them. OFF preserves the original members-only behavior."
  type: bool
  default: false

je_nav_show_mobile:
  description: "Render the MOBILE BOTTOM NAV (tab bar + sheet) on phones. Destinations with mobile_pinned become tabs; the rest live behind the More sheet. OFF leaves mobile navigation to another component. (v2's mobile strip is retired — this switch now controls the bottom bar.)"
  type: bool
  default: false

je_nav_show_brand:
  description: "Show the brand lockup (icon + name) at the left of the strip. Disable if your theme already renders a logo above the strip."
  type: bool
  default: true

je_nav_brand_label:
  description: "Text shown in the brand lockup. Set per site (e.g. 'Jesus Enough', 'Victorious Christians')."
  type: string
  default: "Jesus Enough"

je_nav_brand_icon:
  description: "FontAwesome icon name for the brand lockup."
  type: string
  default: "cross"

je_nav_show_avatar:
  description: "Show a link to the user's account at the right of the strip. Leave OFF if you rely on Discourse's native header avatar menu (recommended, to avoid duplicating the account menu)."
  type: bool
  default: false

je_nav_hide_sidebar_in_plaza:
  description: "Master switch. When ON, the Discourse sidebar is hidden on Plaza routes (everywhere except forum routes) and a per-user pin toggle appears on the strip. When OFF, the sidebar always shows and no toggle is offered."
  type: bool
  default: true

je_nav_sidebar_default_hidden:
  description: "When the master switch is ON, this is the default state for users who haven't set their own preference: hidden (clean app feel) or shown. Each user can override and their choice is remembered in their browser."
  type: bool
  default: true

je_nav_forum_route_classes:
  description: "Body classes that mark a 'forum mode' route, where the sidebar should remain visible. Add more (e.g. tag-show pages) as your forum grows."
  type: list
  list_type: compact
  default: "navigation-categories|navigation-topics|navigation-category|categories-list"

# ── v3: mobile bottom nav ────────────────────────────────────────────────

je_nav_mobile_show_labels:
  description: "Show a small text label under each tab icon on the mobile bottom bar. OFF renders icon-only tabs."
  type: bool
  default: true

je_nav_mobile_hide_on_scroll:
  description: "Slip the bottom bar away while scrolling down and bring it back on scroll up (always visible near the top of the page and while the sheet is open). OFF keeps the bar permanently visible."
  type: bool
  default: true

je_nav_mobile_more_label:
  description: "Label on the trailing overflow tab that opens the full destination sheet."
  type: string
  default: "More"

je_nav_mobile_more_icon:
  description: "FontAwesome icon for the overflow tab."
  type: string
  default: "ellipsis"

je_nav_mobile_suppress_classes:
  description: "Classes (checked on BOTH html and body) marking immersive states where the bottom bar stands down entirely: routes like the AI conversations page, and overlay states like the open composer (composer-open lives on the html element). The bar and content padding return automatically when the class clears."
  type: list
  list_type: compact
  default: "ai-bot-conversations-page|composer-open"

je_nav_mode:
  description: "strip = the navigation renders alongside Discourse's native chrome (current behavior). takeover = RESERVED for a future release where this component becomes the site's sole navigation; today it only adds a body class (je-nav-takeover) and changes nothing visible."
  type: enum
  default: strip
  choices:
    - strip
    - takeover

svg_icons:
  default: "cross|scroll|trophy"
  type: list
  list_type: "compact"
  description: "Extra FontAwesome icons referenced by settings (brand icon, custom destinations). Add any icon you reference in je_nav_destinations here — per site, no rebuild."

# ── v4: identity sheet ────────────────────────────────────────────────────────

je_nav_mobile_avatar_tab:
  description: "Show the member's avatar as the trailing tab on the mobile bottom bar (the FB grammar). Tapping it opens the identity sheet: photo + Change photo, stats, and the quick-links grid. The sheet also opens from the More sheet's profile row and from any surface dispatching the je-nav:identity:open event."
  type: bool
  default: true

je_nav_identity_links:
  description: "The quick-links grid on the identity sheet. label + icon + href (the /my/ alias resolves to the current user) + show_when visibility. Keep this the ONE place 'the profile places' live."
  type: objects
  default:
    [
      { "label": "My Profile", "icon": "user", "href": "/my/summary" },
      { "label": "My Walk", "icon": "cross", "href": "/steering" },
      { "label": "Bookmarks", "icon": "bookmark", "href": "/my/activity/bookmarks" },
      { "label": "Messages", "icon": "envelope", "href": "/my/messages" },
      { "label": "Badges", "icon": "medal", "href": "/badges" },
      { "label": "Preferences", "icon": "gear", "href": "/my/preferences" },
    ]
  schema:
    name: "identity_link"
    identifier: label
    properties:
      label:
        type: string
        required: true
      icon:
        type: string
      href:
        type: string
        required: true
        validations:
          url: true
      order:
        type: integer
      show_when:
        type: enum
        default: all
        choices:
          - all
          - members
          - staff

je_nav_identity_primary_label:
  description: "Label on the identity sheet's primary button."
  type: string
  default: "Update your profile"

je_nav_identity_primary_href:
  description: "Destination of the identity sheet's primary button (the /my/ alias resolves)."
  type: string
  default: "/steering/profile"
