en:
  theme_metadata:
    description: "Per-site, admin-managed navigation system: desktop strip with mega-menu dropdowns, and a mobile bottom tab bar with an overflow sheet. One destination schema drives both. The whole menu lives in theme settings."
    settings:
      je_nav_destinations:
        description: "The primary navigation. Rows appear in 'order' (blank orders keep list position). type 'link' goes to href; 'dropdown' opens children — give children a 'section' label for mega-menu columns."
        schema:
          properties:
            label:
              label: "Label"
              description: "Text shown on the strip."
            icon:
              label: "Icon"
              description: "FontAwesome icon name (add new icons to the svg_icons setting)."
            type:
              label: "Type"
              description: "link = direct destination · dropdown = opens child panel."
            href:
              label: "Link (href)"
              description: "Destination path. /my/… resolves to the current user."
            color:
              label: "Icon color"
              description: "CSS color for the icon when not active (blank = neutral)."
            badge:
              label: "Badge"
              description: "Optional accent chip, e.g. NEW or LIVE."
            order:
              label: "Order"
              description: "Position on the strip, ascending. Blank items keep their list position after ordered ones."
            show_when:
              label: "Visible to"
              description: "all · members (logged-in) · staff."
            mobile_pinned:
              label: "Pin to mobile bar"
              description: "Show as a tab on the mobile bottom bar. Unpinned destinations live behind the More sheet. If nothing is pinned, the first four destinations auto-pin."
            children:
              label: "Dropdown children"
              description: "Rows inside the dropdown panel."
              schema:
                properties:
                  label:
                    label: "Label"
                  icon:
                    label: "Icon"
                  href:
                    label: "Link (href)"
                  subtext:
                    label: "Subtext"
                    description: "Small second line under the label."
                  section:
                    label: "Section"
                    description: "Children sharing a section render as one titled mega-menu column."
                  badge:
                    label: "Badge"
                  order:
                    label: "Order"
                    description: "Position within the section, ascending."
                  show_when:
                    label: "Visible to"
      je_nav_show_anon: "Show the strip to logged-out visitors (members/staff items stay hidden for them)."
      je_nav_show_mobile: "Render the mobile bottom nav (tab bar + More sheet) on phones."
      je_nav_mobile_show_labels: "Show text labels under the bottom-bar tab icons."
      je_nav_mobile_hide_on_scroll: "Hide the bar scrolling down, reveal it scrolling up."
      je_nav_mobile_more_label: "Label on the overflow tab."
      je_nav_mobile_more_icon: "Icon on the overflow tab."
      je_nav_mobile_suppress_classes: "Body classes marking routes where the bottom bar hides (immersive surfaces)."
      je_nav_mode: "strip = alongside native chrome · takeover = reserved for a future sole-navigation mode."
      je_nav_show_brand: "Show the brand lockup (icon + name) at the left of the strip."
      je_nav_brand_label: "Text shown in the brand lockup — set per site."
      je_nav_brand_icon: "FontAwesome icon name for the brand lockup."
      je_nav_show_avatar: "Show an account link at the right of the strip (off by default — Discourse's native avatar menu already covers this)."
      je_nav_hide_sidebar_in_plaza: "Hide the Discourse sidebar everywhere except forum routes (Plaza mode). Desktop only."
      je_nav_sidebar_default_hidden: "Default sidebar state for users without a saved preference, when Plaza mode is on."
      je_nav_forum_route_classes: "Body classes that mark a forum route, where the sidebar stays visible."
      svg_icons: "Extra FontAwesome icons referenced by your destinations or brand — per site, no rebuild."
